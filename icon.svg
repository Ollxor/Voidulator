<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#111318"/>
  <g transform="translate(256,256)" fill="none" stroke="#40d8a0">
    <!-- Outer circle -->
    <circle r="190" stroke-width="3" opacity="0.35"/>
    <!-- Mid circle -->
    <circle r="160" stroke-width="2" opacity="0.5"/>
    <!-- Pentagon 1 -->
    <polygon points="0,-155 147.4,-47.9 91.1,125.4 -91.1,125.4 -147.4,-47.9" stroke-width="2" opacity="0.6"/>
    <!-- Rotated square -->
    <rect x="-113" y="-113" width="226" height="226" stroke-width="2" opacity="0.5" transform="rotate(15)"/>
    <!-- Pentagon 2 (rotated) -->
    <polygon points="0,-130 123.6,-40.2 76.4,105.2 -76.4,105.2 -123.6,-40.2" stroke-width="1.5" opacity="0.7" transform="rotate(36)"/>
    <!-- Cross lines -->
    <line x1="-140" y1="-80" x2="140" y2="80" stroke-width="1" opacity="0.3"/>
    <line x1="140" y1="-80" x2="-140" y2="80" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-150" x2="0" y2="150" stroke-width="1" opacity="0.25"/>
    <line x1="-150" y1="0" x2="150" y2="0" stroke-width="1" opacity="0.25"/>
    <!-- Void -->
    <circle r="52" fill="#111318" stroke-width="2.5" opacity="0.8"/>
    <!-- Center dot -->
    <circle r="3" fill="#40d8a0" opacity="0.7"/>
  </g>
</svg>
