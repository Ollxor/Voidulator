name: smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install Playwright
        run: |
          npm init -y > /dev/null
          npm install playwright@1
          npx playwright install --with-deps chromium
      - name: Run smoke test
        run: node tests/smoke.mjs
